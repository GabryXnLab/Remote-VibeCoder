<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>Remote VibeCoder — Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="terminal-page">

    <!-- Header -->
    <header class="terminal-header">
      <a href="projects.html" class="btn btn-small btn-secondary" style="padding:4px 10px">←</a>
      <span class="terminal-title" id="terminal-title">Loading…</span>
      <button class="toolbar-btn" id="btn-files">Files</button>
      <button class="btn-theme" id="btn-theme" title="Toggle light/dark theme">☀</button>
      <div class="terminal-status">
        <div class="status-dot connecting" id="status-dot"></div>
        <span id="status-text">Connecting</span>
      </div>
    </header>

    <!-- Terminal display (output only on mobile) -->
    <div class="terminal-wrapper">
      <div id="terminal"></div>
      <div class="reconnect-overlay" id="reconnect-overlay">
        <div class="spinner"></div>
        <p class="reconnect-message" id="reconnect-message">Reconnecting…</p>
        <button class="btn btn-primary btn-small" id="reconnect-btn">Reconnect now</button>
      </div>
    </div>

    <!-- Mobile input bar removed as redundant -->


    <!-- Toolbar: special keys -->
    <div class="terminal-toolbar" id="toolbar">
      <button class="toolbar-btn" id="btn-enter" title="Enter">↵</button>
      <button class="toolbar-btn" id="btn-ctrlc" title="Ctrl+C">Ctrl+C</button>
      <button class="toolbar-btn" id="btn-tab" title="Tab">Tab</button>
      <button class="toolbar-btn" id="btn-esc" title="Escape">Esc</button>
      <button class="toolbar-btn" id="btn-up" title="↑">↑</button>
      <button class="toolbar-btn" id="btn-down" title="↓">↓</button>
      <button class="toolbar-btn" id="btn-left" title="←">←</button>
      <button class="toolbar-btn" id="btn-right" title="→">→</button>
      <button class="toolbar-btn" id="btn-scroll-bottom" title="Scroll to bottom">⬇ End</button>
      <button class="toolbar-btn" id="btn-refresh" title="Refresh terminal display">Refresh</button>
      <button class="toolbar-btn" id="btn-kill-session" style="margin-left:auto;color:var(--danger);border-color:var(--danger)">Kill</button>
    </div>

  </div>

  <!-- File browser drawer (fixed overlay, slides up from bottom) -->
  <div class="file-drawer" id="file-drawer">
    <div class="file-drawer-handle"></div>
    <div class="file-drawer-header">
      <button class="toolbar-btn" id="btn-drawer-back">← Back</button>
      <span class="file-drawer-path" id="file-drawer-path">/</span>
      <button class="toolbar-btn" id="btn-drawer-close">✕</button>
    </div>
    <div class="file-drawer-search">
      <input type="search" id="file-drawer-search" placeholder="Search files…"
             autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
    </div>
    <div class="file-drawer-list" id="file-drawer-list"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/terminal.js"></script>
</body>
</html>
