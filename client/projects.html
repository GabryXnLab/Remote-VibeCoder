<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>Remote VibeCoder — Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="projects-page">
    <header class="header">
      <div class="header-logo">
        ⌘ <span>Remote</span>VibeCoder
      </div>
      <div class="header-actions">
        <button class="btn btn-small btn-secondary" id="refresh-btn" title="Refresh repos">↺</button>
        <button class="btn btn-small btn-secondary" id="logout-btn">Logout</button>
      </div>
    </header>

    <main class="projects-content" id="content">
      <div class="loading-spinner" id="loading">
        <div class="spinner"></div>
        Loading repositories…
      </div>

      <div id="error-container" class="hidden"></div>

      <!-- Active sessions section -->
      <div id="sessions-section" class="hidden">
        <p class="section-title">Active Sessions</p>
        <div class="repo-list" id="sessions-list"></div>
      </div>

      <!-- All repos section -->
      <div id="repos-section" class="hidden">
        <p class="section-title">GitHub Repositories</p>
        <div class="repo-list" id="repos-list"></div>
      </div>
    </main>
  </div>

  <script src="js/projects.js"></script>
</body>
</html>
