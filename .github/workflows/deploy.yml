name: Deploy to GCP VM

on:
  push:
    branches: [master]

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit dependencies
        run: |
          cd server
          npm ci --ignore-scripts
          # Fail on high or critical severity vulnerabilities
          npm audit --audit-level=high

  deploy:
    name: SSH deploy → e2-micro
    runs-on: ubuntu-latest
    needs: audit

    steps:
      - name: Checkout (for changed-files detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect what changed
        id: changes
        run: |
          # Handle first commit (no HEAD~1)
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff --name-only HEAD~1 HEAD > changed.txt
          else
            git diff-tree --no-commit-id -r --name-only HEAD > changed.txt
          fi
          echo "Changed files:"
          cat changed.txt

          if grep -q 'server/package' changed.txt; then
            echo "deps_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "deps_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -q 'config/claude-mobile.service' changed.txt; then
            echo "service_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "service_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPS_CHANGED,SERVICE_CHANGED
          script_stop: true
          script: |
            set -euo pipefail

            echo "── Pulling latest code ──"
            git -C ~/claude-mobile pull --ff-only

            if [ "${DEPS_CHANGED:-false}" = "true" ]; then
              echo "── package.json changed → npm install ──"
              cd ~/claude-mobile/server && npm install --omit=dev
            fi

            if [ "${SERVICE_CHANGED:-false}" = "true" ]; then
              echo "── Updating systemd unit ──"
              SERVICE="claude-mobile@$(whoami).service"
              sudo cp ~/claude-mobile/config/claude-mobile.service "/etc/systemd/system/$SERVICE"
              sudo systemctl daemon-reload
            fi

            echo "── Restarting service ──"
            sudo systemctl restart "claude-mobile@$(whoami)"

            sleep 3

            sudo systemctl is-active --quiet "claude-mobile@$(whoami)" \
              && echo "✓ Service is running" \
              || { echo "✗ Service failed to start"; sudo journalctl -u "claude-mobile@$(whoami)" -n 30 --no-pager; exit 1; }

            echo "── Health check ──"
            curl -sf http://localhost:3000/api/health \
              && echo "✓ Health check passed" \
              || { echo "✗ Health check failed"; exit 1; }
        env:
          DEPS_CHANGED: ${{ steps.changes.outputs.deps_changed }}
          SERVICE_CHANGED: ${{ steps.changes.outputs.service_changed }}
