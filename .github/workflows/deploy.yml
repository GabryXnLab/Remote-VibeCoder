name: Deploy to VM

on:
  push:
    branches: [master]

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit server dependencies
        run: |
          cd server
          npm ci --ignore-scripts
          npm audit --audit-level=high

  typecheck:
    name: TypeScript gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        run: cd client-src && npm install
      - name: tsc --noEmit (strict gate)
        run: cd client-src && npx tsc --noEmit
      - name: Vite build (verify bundle compiles)
        run: cd client-src && npm run build

  deploy:
    name: SSH deploy → VM
    runs-on: ubuntu-latest
    needs: [audit, typecheck]

    # APP_DIR: subdirectory app sotto $HOME sul server (default: claude-mobile)
    # Configurabile come GitHub repository variable (non secret — non è un dato sensibile)
    env:
      APP_DIR: ${{ vars.APP_DIR || 'claude-mobile' }}
      REPO_SLUG: ${{ github.repository }}

    steps:
      - name: Checkout (for changed-files detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect what changed
        id: changes
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff --name-only HEAD~1 HEAD > changed.txt
          else
            git diff-tree --no-commit-id -r --name-only HEAD > changed.txt
          fi
          echo "Changed files:"
          cat changed.txt

          if grep -qE 'config/claude-mobile\.service(\.tmpl)?$' changed.txt; then
            echo "service_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "service_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SERVICE_CHANGED,GH_PAT,APP_DIR,REPO_SLUG
          script_stop: true
          script: |
            set -euo pipefail

            echo "── Pulling latest code ──"
            git -C ~/$APP_DIR fetch "https://x-access-token:${GH_PAT}@github.com/${REPO_SLUG}.git" master
            git -C ~/$APP_DIR reset --hard FETCH_HEAD

            echo "── Installing server dependencies ──"
            cd ~/$APP_DIR/server && npm install --omit=dev

            echo "── Installing frontend dependencies ──"
            cd ~/$APP_DIR/client-src && npm install

            echo "── Building frontend (Vite → dist/) ──"
            cd ~/$APP_DIR/client-src && npm run build

            if [ "${SERVICE_CHANGED:-false}" = "true" ]; then
              echo "── Updating systemd unit ──"
              SERVICE="claude-mobile@$(whoami).service"
              sudo cp ~/$APP_DIR/config/claude-mobile.service "/etc/systemd/system/$SERVICE"
              sudo systemctl daemon-reload
            fi

            echo "── Restarting service ──"
            sudo systemctl restart "claude-mobile@$(whoami)"

            sleep 3

            sudo systemctl is-active --quiet "claude-mobile@$(whoami)" \
              && echo "✓ Service is running" \
              || { echo "✗ Service failed to start"; sudo journalctl -u "claude-mobile@$(whoami)" -n 30 --no-pager; exit 1; }

            echo "── Health check ──"
            curl -sf http://localhost:3000/api/health \
              && echo "✓ Health check passed" \
              || { echo "✗ Health check failed"; exit 1; }
        env:
          SERVICE_CHANGED: ${{ steps.changes.outputs.service_changed }}
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
