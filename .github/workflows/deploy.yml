name: Deploy to VM

on:
  push:
    branches: [master]

jobs:
  audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: server/pnpm-lock.yaml
      - name: Audit server dependencies
        run: |
          cd server
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm audit --audit-level=high

  validate-server:
    name: Server JS syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check syntax of all server JS files
        run: |
          echo "── Checking server JS syntax ──"
          find server -name '*.js' -not -path '*/node_modules/*' -type f | while read f; do
            node --check "$f" && echo "  ✓ $f" || { echo "  ✗ $f — syntax error"; exit 1; }
          done
          echo "✓ All server files passed syntax check"

  typecheck:
    name: TypeScript gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: client-src/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: cd client-src && pnpm install --frozen-lockfile
      - name: tsc --noEmit (strict gate)
        run: cd client-src && pnpm exec tsc --noEmit
      - name: Vite build (verify bundle compiles)
        run: cd client-src && pnpm run build
      - name: Verify build output completeness
        run: |
          echo "── Checking build output ──"
          # Entry point must exist
          test -f dist/index.html         || { echo "✗ dist/index.html missing"; exit 1; }

          # JS chunks: entry (index), vendor (react/router), xterm
          INDEX_JS=$(ls dist/assets/index-*.js  2>/dev/null | head -1)
          VENDOR_JS=$(ls dist/assets/vendor-*.js 2>/dev/null | head -1)
          XTERM_JS=$(ls  dist/assets/xterm-*.js  2>/dev/null | head -1)
          CSS_FILE=$(ls  dist/assets/index-*.css 2>/dev/null | head -1)

          test -n "$INDEX_JS"  || { echo "✗ index chunk missing";  exit 1; }
          test -n "$VENDOR_JS" || { echo "✗ vendor chunk missing"; exit 1; }
          test -n "$XTERM_JS"  || { echo "✗ xterm chunk missing";  exit 1; }
          test -n "$CSS_FILE"  || { echo "✗ CSS bundle missing";   exit 1; }

          # Size sanity checks (catch accidental empty bundles)
          INDEX_SIZE=$(wc -c  < "$INDEX_JS")
          VENDOR_SIZE=$(wc -c < "$VENDOR_JS")
          XTERM_SIZE=$(wc -c  < "$XTERM_JS")
          CSS_SIZE=$(wc -c    < "$CSS_FILE")

          echo "  index:  ${INDEX_SIZE} B"
          echo "  vendor: ${VENDOR_SIZE} B"
          echo "  xterm:  ${XTERM_SIZE} B"
          echo "  css:    ${CSS_SIZE} B"

          # Minimum expected sizes (rough sanity — not exact)
          test "$VENDOR_SIZE" -gt 50000  || { echo "✗ vendor chunk suspiciously small (${VENDOR_SIZE} B)"; exit 1; }
          test "$XTERM_SIZE"  -gt 100000 || { echo "✗ xterm chunk suspiciously small (${XTERM_SIZE} B)"; exit 1; }
          test "$CSS_SIZE"    -gt 5000   || { echo "✗ CSS bundle suspiciously small (${CSS_SIZE} B)"; exit 1; }

          # Verify xterm.css was included (xterm.js injects styles at runtime, but the
          # explicit import 'xterm/css/xterm.css' in TerminalPage must land in the CSS bundle)
          grep -q 'xterm' "$CSS_FILE" \
            || { echo "✗ xterm styles not found in CSS bundle"; exit 1; }

          echo "✓ All build output checks passed"

  deploy:
    name: SSH deploy → VM
    runs-on: ubuntu-latest
    needs: [audit, validate-server, typecheck]

    # APP_DIR: subdirectory app sotto $HOME sul server (default: claude-mobile)
    # Configurabile come GitHub repository variable (non secret — non è un dato sensibile)
    env:
      APP_DIR: ${{ vars.APP_DIR || 'claude-mobile' }}
      REPO_SLUG: ${{ github.repository }}

    steps:
      - name: Checkout (for changed-files detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect what changed
        id: changes
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff --name-only HEAD~1 HEAD > changed.txt
          else
            git diff-tree --no-commit-id -r --name-only HEAD > changed.txt
          fi
          echo "Changed files:"
          cat changed.txt

          if grep -qE 'config/claude-mobile\.service(\.tmpl)?$' changed.txt; then
            echo "service_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "service_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SERVICE_CHANGED,GH_PAT,APP_DIR,REPO_SLUG
          script_stop: true
          script: |
            set -euo pipefail

            echo "── Checking for pnpm ──"
            if ! command -v pnpm &>/dev/null; then
              echo "pnpm not found, installing..."
              npm install -g pnpm
            fi

            echo "── Pulling latest code ──"
            PREV_HEAD=$(git -C ~/$APP_DIR rev-parse HEAD)
            git -C ~/$APP_DIR fetch "https://x-access-token:${GH_PAT}@github.com/${REPO_SLUG}.git" master
            git -C ~/$APP_DIR reset --hard FETCH_HEAD
            echo "  $PREV_HEAD → $(git -C ~/$APP_DIR rev-parse HEAD)"

            echo "── Server-side JS syntax check (pre-deploy gate) ──"
            find ~/$APP_DIR/server -name '*.js' -not -path '*/node_modules/*' -type f | while read f; do
              node --check "$f" || { echo "✗ Syntax error in $f — aborting deploy"; exit 1; }
            done
            echo "✓ Server syntax OK"

            echo "── Installing server dependencies ──"
            cd ~/$APP_DIR/server && pnpm install --frozen-lockfile --prod

            echo "── Installing frontend dependencies (including devDeps for build) ──"
            cd ~/$APP_DIR/client-src && pnpm install --frozen-lockfile

            echo "── Building frontend (Vite → dist/) ──"
            cd ~/$APP_DIR/client-src && pnpm run build

            echo "── Verifying build output ──"
            test -f ~/$APP_DIR/dist/index.html \
              || { echo "✗ dist/index.html missing — aborting"; exit 1; }
            ls ~/$APP_DIR/dist/assets/index-*.js  >/dev/null 2>&1 \
              || { echo "✗ index JS chunk missing — aborting"; exit 1; }
            ls ~/$APP_DIR/dist/assets/vendor-*.js >/dev/null 2>&1 \
              || { echo "✗ vendor JS chunk missing — aborting"; exit 1; }
            ls ~/$APP_DIR/dist/assets/xterm-*.js  >/dev/null 2>&1 \
              || { echo "✗ xterm JS chunk missing — aborting"; exit 1; }
            ls ~/$APP_DIR/dist/assets/index-*.css >/dev/null 2>&1 \
              || { echo "✗ CSS bundle missing — aborting"; exit 1; }
            echo "✓ Build output verified"

            if [ "${SERVICE_CHANGED:-false}" = "true" ]; then
              echo "── Updating systemd unit ──"
              SERVICE="claude-mobile@$(whoami).service"
              sudo cp ~/$APP_DIR/config/claude-mobile.service "/etc/systemd/system/$SERVICE"
              sudo systemctl daemon-reload
            fi

            echo "── Restarting service ──"
            sudo systemctl restart "claude-mobile@$(whoami)"

            echo "── Waiting for service to become active (up to 30s) ──"
            for i in $(seq 1 10); do
              if sudo systemctl is-active --quiet "claude-mobile@$(whoami)"; then
                echo "✓ Service active after ${i}×3s"
                break
              fi
              if [ "$i" -eq 10 ]; then
                echo "✗ Service failed to start after 30s"
                sudo journalctl -u "claude-mobile@$(whoami)" -n 50 --no-pager
                git -C ~/$APP_DIR reset --hard "$PREV_HEAD"
                echo "⚠ Rolled back to $PREV_HEAD"
                sudo systemctl restart "claude-mobile@$(whoami)"
                exit 1
              fi
              sleep 3
            done

            echo "── Health check (up to 15s) ──"
            for i in $(seq 1 5); do
              if curl -sf http://localhost:3000/api/health > /dev/null; then
                echo "✓ Health check passed"
                break
              fi
              if [ "$i" -eq 5 ]; then
                echo "✗ Health check failed after 5 attempts"
                sudo journalctl -u "claude-mobile@$(whoami)" -n 20 --no-pager
                exit 1
              fi
              sleep 3
            done

            echo "── Deploy complete ✓ ──"
        env:
          SERVICE_CHANGED: ${{ steps.changes.outputs.service_changed }}
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
